<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Key - Sophisticated UI</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #8e2de2, #4a00e0);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0b0f;
            color: #ffffff;
            overflow: hidden;
        }

        /* Nền mờ ảo */
        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: #4a00e0;
            filter: blur(140px);
            border-radius: 50%;
            top: 20%;
            left: 20%;
            z-index: -1;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }

        /* Khu vực hiển thị Key */
        .key-container {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border-glass);
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .key-container:hover {
            border-color: #8e2de2;
            background: rgba(255, 255, 255, 0.05);
        }

        #keyValue {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d2ff;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .copy-hint {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #8e2de2;
            font-weight: 600;
        }

        /* Nút Copy */
        .btn {
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.4);
        }

        /* Thông báo nhỏ khi copy */
        .toast {
            position: fixed;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.5s;
            z-index: 100;
        }

        .toast.show {
            top: 30px;
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">Copied to clipboard! ✓</div>

    <div class="card">
        <h1>Your Key</h1>
        <p>Click on the box or button below to copy</p>
        
        <div class="key-container" id="copyBox" onclick="copyAction()">
            <span id="keyValue">NO KEY FOUND</span>
            <span class="copy-hint">CLICK TO COPY</span>
        </div>

        <button class="btn" onclick="copyAction()">Copy Now</button>
    </div>

    <script>
        // Lấy key từ URL ?key=ABC
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');
        const display = document.getElementById('keyValue');

        if (key) {
            display.innerText = key;
        }

        // Xử lý hành động copy
        function copyAction() {
            const text = display.innerText;
            if (key) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast();
                });
            } else {
                alert("Không có key để copy!");
            }
        }

        // Hiện thông báo
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
