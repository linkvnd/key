<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickMMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #7c3aed;
            --accent-2: #2563eb;
            --glow: rgba(124, 58, 237, 0.45);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(124, 58, 237, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #070710;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* Background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #4c1d95 0%, transparent 70%);
            top: -150px; right: -100px;
            opacity: 0.5;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, #1e3a8a 0%, transparent 70%);
            bottom: -100px; left: -80px;
            opacity: 0.4;
            animation: drift 10s ease-in-out infinite alternate-reverse;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.12;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(20px, 20px); }
        }

        /* Grid pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 36px 32px;
            border-radius: 28px;
            width: 100%;
            max-width: 430px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(124, 58, 237, 0.18);
            border: 1px solid rgba(124, 58, 237, 0.4);
            color: #c4b5fd;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 30px;
            margin-bottom: 20px;
        }
        .badge-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #a78bfa;
            box-shadow: 0 0 8px #a78bfa;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Key display box */
        .key-container {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 22px;
            cursor: pointer;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .key-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(124,58,237,0.08), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .key-container:hover {
            border-color: var(--border-hover);
            background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.15);
        }
        .key-container:hover::before { opacity: 1; }

        .key-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(167, 139, 250, 0.7);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .key-label::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        #keyValue {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ddd6fe;
            letter-spacing: 0.05em;
            word-break: break-all;
            line-height: 1.5;
        }

        .copy-hint {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 12px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(124, 58, 237, 0.8);
            letter-spacing: 0.05em;
        }
        .copy-hint svg { width: 12px; height: 12px; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(124, 58, 237, 0.5);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn svg { width: 16px; height: 16px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 35, 0.95);
            border: 1px solid rgba(124, 58, 237, 0.5);
            color: #c4b5fd;
            padding: 11px 22px;
            border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(16px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast svg { width: 15px; height: 15px; color: #4ade80; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Copied to clipboard!
    </div>

    <div class="card">
        <div class="badge">
            <span class="badge-dot"></span>
            ClickMMO
        </div>

        <h1>Your Key</h1>
        <p class="subtitle">Click on the box or button below to copy</p>

        <div class="key-container" id="copyBox" onclick="copyAction()">
            <div class="key-label">Activation Key</div>
            <span id="keyValue">NO KEY FOUND</span>
            <div class="copy-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                CLICK TO COPY
            </div>
        </div>

        <button class="btn" onclick="copyAction()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy Now
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');
        const display = document.getElementById('keyValue');

        if (key) {
            display.innerText = key;
        }

        function copyAction() {
            const text = display.innerText;
            if (key) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast();
                });
            } else {
                alert("Không có key để copy!");
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }
    </script>
</body>
</html>
