<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Viewer - Premium UI</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0f0c29;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            overflow: hidden;
        }

        /* Hiệu ứng đốm sáng nền */
        .circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: var(--secondary);
        }

        .key-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            margin: 20px 0;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.3s;
        }

        .key-box:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary);
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }

        .btn-copy:hover {
            background: #5b49cf;
            transform: scale(1.02);
        }

        .btn-copy:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Thông báo nhỏ */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #00b894;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 10px;
            position: fixed;
            z-index: 5;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="circle"></div>

    <div class="container">
        <h2>Your Access Key</h2>
        <div class="key-box" id="keyDisplay" title="Click to copy">
            Đang tải key...
        </div>
        <button class="btn-copy" onclick="copyKey()">Copy Key</button>
        <div class="footer">© 2026 Developed by You</div>
    </div>

    <div id="toast">Đã sao chép vào bộ nhớ!</div>

    <script>
        // Hàm lấy giá trị từ tham số URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const key = getQueryParam('key');
        const display = document.getElementById('keyDisplay');

        if (key) {
            display.innerText = key;
        } else {
            display.innerText = "Không tìm thấy Key";
            display.style.color = "#ff7675";
        }

        // Hàm copy
        function copyKey() {
            const textToCopy = display.innerText;
            if (key) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const toast = document.getElementById("toast");
                    toast.className = "show";
                    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
                });
            }
        }
    </script>
</body>
</html>
